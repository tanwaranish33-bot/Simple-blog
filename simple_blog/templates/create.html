{% extends "base.html" %}
{# create.html — New post form (Task 3 — Create) #}

{% block title %}New Post{% endblock %}

{% block content %}
<div class="form-page">

  <!-- Page heading with back link -->
  <div class="form-page-header">
    <a href="{{ url_for('index') }}" class="back-link">← Back to Home</a>
    <h1 class="page-title">New Post</h1>
    <p class="page-subtitle">Fill in a title and content, then publish.</p>
  </div>

  <!-- Server-side validation error -->
  {% if error %}
    <div class="alert alert--error">{{ error }}</div>
  {% endif %}

  <!-- Create Form: POST to /create -->
  <form method="POST" action="{{ url_for('create') }}" class="blog-form" novalidate>

    <!-- Title field -->
    <div class="form-group">
      <label for="title" class="form-label">Post Title <span class="required">*</span></label>
      <input
        type="text"
        id="title"
        name="title"
        class="form-input"
        placeholder="Enter a compelling title…"
        maxlength="150"
        value="{{ request.form.get('title', '') }}"
        required
        autofocus
      />
    </div>

    <!-- Content field -->
    <div class="form-group">
      <label for="content" class="form-label">Content <span class="required">*</span></label>
      <textarea
        id="content"
        name="content"
        class="form-textarea"
        placeholder="Write your post here…"
        rows="10"
        required
      >{{ request.form.get('content', '') }}</textarea>
    </div>

    <!-- Form actions -->
    <div class="form-actions">
      <a href="{{ url_for('index') }}" class="btn btn-ghost">Cancel</a>
      <button type="submit" class="btn btn-primary">Publish Post →</button>
    </div>

  </form>
</div>
{% endblock %}

<!DOCTYPE html>
<!--
  base.html — Master layout template
  All other templates extend this file using Jinja2 template inheritance.
  The {% block %} tags define slots that child templates fill in.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Simple Blog{% endblock %} · Inkwell</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <!-- ===== Top Navigation Bar ===== -->
  <header class="site-header">
    <div class="header-inner">
      <!-- Brand / Logo -->
      <a href="{{ url_for('index') }}" class="brand">
        <span class="brand-mark">✦</span>
        <span class="brand-name">Ink<span class="brand-accent">well</span></span>
      </a>

      <!-- Navigation Links (Task 7 Bonus) -->
      <nav class="site-nav" aria-label="Main navigation">
        <a href="{{ url_for('index') }}"  class="nav-link">Home</a>
        <a href="{{ url_for('create') }}" class="nav-link nav-link--cta">+ New Post</a>
      </nav>
    </div>
  </header>

  <!-- ===== Flash / Alert Messages ===== -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-wrapper">
        {% for category, message in messages %}
          <div class="flash flash--{{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <!-- ===== Page Content (filled by child templates) ===== -->
  <main class="site-main">
    {% block content %}{% endblock %}
  </main>

  <!-- ===== Footer ===== -->
  <footer class="site-footer">
    <p>Simple Blog · Built with Flask &amp; Jinja2 · Experiment 5</p>
  </footer>

</body>
</html>
